<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 260" width="100%" height="100%">
  <!-- Definition of gradients and filters -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a051b" />
      <stop offset="50%" stop-color="#0c0d21" />
      <stop offset="100%" stop-color="#020308" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="50%" stop-color="#4facfe" />
      <stop offset="100%" stop-color="#00f2fe" />
    </linearGradient>
    <linearGradient id="subGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f093fb" />
      <stop offset="100%" stop-color="#f5576c" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="softGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="850" height="260" rx="15" fill="url(#bgGrad)" />

  <!-- Background Tech Elements / Grid Pattern -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.04">
    <!-- Vertical lines -->
    <line x1="50" y1="0" x2="50" y2="260" />
    <line x1="150" y1="0" x2="150" y2="260" />
    <line x1="250" y1="0" x2="250" y2="260" />
    <line x1="350" y1="0" x2="350" y2="260" />
    <line x1="450" y1="0" x2="450" y2="260" />
    <line x1="550" y1="0" x2="550" y2="260" />
    <line x1="650" y1="0" x2="650" y2="260" />
    <line x1="750" y1="0" x2="750" y2="260" />
    <!-- Horizontal lines -->
    <line x1="0" y1="50" x2="850" y2="50" />
    <line x1="0" y1="100" x2="850" y2="100" />
    <line x1="0" y1="150" x2="850" y2="150" />
    <line x1="0" y1="200" x2="850" y2="200" />
  </g>

  <!-- Abstract glowing circles in the corners -->
  <circle cx="800" cy="50" r="100" fill="#00f2fe" opacity="0.1" filter="url(#softGlow)" />
  <circle cx="50" cy="220" r="80" fill="#f093fb" opacity="0.08" filter="url(#softGlow)" />
  <circle cx="450" cy="130" r="120" fill="#4facfe" opacity="0.05" filter="url(#softGlow)" />

  <!-- Technical/Code decorative lines -->
  <path d="M 30 50 L 80 50 L 95 65 L 200 65" fill="none" stroke="#4facfe" stroke-width="1.5" opacity="0.25" />
  <circle cx="200" cy="65" r="3" fill="#4facfe" opacity="0.5" />
  <path d="M 820 210 L 770 210 L 755 195 L 650 195" fill="none" stroke="#f093fb" stroke-width="1.5" opacity="0.25" />
  <circle cx="650" cy="195" r="3" fill="#f093fb" opacity="0.5" />

  <!-- Code bracket elements (visual framing) -->
  <text x="35" y="150" fill="#4facfe" font-family="'Courier New', monospace" font-size="32" font-weight="bold" opacity="0.2">&lt;</text>
  <text x="795" y="150" fill="#f093fb" font-family="'Courier New', monospace" font-size="32" font-weight="bold" opacity="0.2">/&gt;</text>

  <!-- Content (Centered) -->
  <g transform="translate(425, 130)" text-anchor="middle">
    <!-- Hello tag -->
    <rect x="-65" y="-95" width="130" height="28" rx="14" fill="#1b1c30" stroke="#4facfe" stroke-width="1" opacity="0.8" />
    <text x="0" y="-76" fill="#00f2fe" font-family="'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="bold" letter-spacing="2">HELLO WORLD</text>

    <!-- Main Title -->
    <text x="0" y="-20" fill="#ffffff" font-family="'Outfit', 'Segoe UI', system-ui, sans-serif" font-size="42" font-weight="800" letter-spacing="1">
      MUHAMMAD YASEEN C
    </text>

    <!-- Subtitle / Role -->
    <text x="0" y="25" fill="url(#subGrad)" font-family="'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="600" letter-spacing="4">
      MERN STACK DEVELOPER
    </text>

    <!-- Short description or status -->
    <text x="0" y="60" fill="#8d94ba" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="400" letter-spacing="1">
      Crafting modern, scalable &amp; high-performance web applications
    </text>
  </g>
</svg>
